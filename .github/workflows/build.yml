name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create Universal Binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/memo-words \
            target/x86_64-apple-darwin/release/memo-words \
            -output memo-words

      - name: Create .app bundle
        run: |
          mkdir -p MemoWords.app/Contents/MacOS
          mkdir -p MemoWords.app/Contents/Resources
          cp memo-words MemoWords.app/Contents/MacOS/memo-words
          cp Info.plist MemoWords.app/Contents/Info.plist
          chmod +x MemoWords.app/Contents/MacOS/memo-words

      - name: Create ZIP
        run: ditto -c -k --keepParent MemoWords.app MemoWords.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemoWords
          path: MemoWords.zip
