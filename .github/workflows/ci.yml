name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      # RustSec advisory scan of Cargo.lock. Vulnerabilities fail the build;
      # unmaintained/unsound advisories are reported as warnings only.
      - name: Audit (RustSec advisories)
        run: cargo audit

      # Supply-chain policy from deny.toml: advisories (with documented
      # ignores), banned/wildcard crates, and trusted sources. Lockfile-only,
      # so it runs on Linux even though the app itself targets macOS.
      - name: Deny (advisories, bans, sources)
        run: cargo deny check advisories bans sources
