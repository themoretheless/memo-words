name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT

      - name: Check tag doesn't exist
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.version }} already exists. Update version in Cargo.toml first."
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create Universal Binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/memo-words \
            target/x86_64-apple-darwin/release/memo-words \
            -output memo-words

      - name: Create .app bundle
        run: |
          mkdir -p MemoWords.app/Contents/MacOS
          mkdir -p MemoWords.app/Contents/Resources
          cp memo-words MemoWords.app/Contents/MacOS/memo-words
          cp Info.plist MemoWords.app/Contents/Info.plist
          chmod +x MemoWords.app/Contents/MacOS/memo-words

      - name: Create ZIP
        run: ditto -c -k --keepParent MemoWords.app MemoWords.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: MemoWords.zip
          generate_release_notes: true
