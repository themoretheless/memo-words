name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create Universal Binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/memo-words \
            target/x86_64-apple-darwin/release/memo-words \
            -output memo-words

      - name: Create .app bundle
        run: |
          mkdir -p MemoWords.app/Contents/MacOS
          mkdir -p MemoWords.app/Contents/Resources
          cp memo-words MemoWords.app/Contents/MacOS/memo-words
          cp Info.plist MemoWords.app/Contents/Info.plist
          chmod +x MemoWords.app/Contents/MacOS/memo-words

      - name: Create ZIP
        run: |
          ditto -c -k --keepParent MemoWords.app MemoWords.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: MemoWords.zip
          generate_release_notes: true
