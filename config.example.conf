# Memo Words configuration.
# Copy to ~/.config/memo-words/config.conf (or point MEMO_CONFIG at this file).
# Every key is optional; omitted keys keep their default. Unknown keys and
# unparseable values are ignored.

# Seconds each word stays on screen before the next one (default 30).
interval_secs = 30

# Random +/- variation applied to the interval, in seconds (default 0 = off).
# e.g. interval_secs=30, jitter_secs=10 -> each word stays 20-40s.
jitter_secs = 0

# Seconds after the word appears before the transcription fades in (default 5).
transcription_delay = 5

# Seconds after the word appears before the translation fades in (default 10).
translation_delay = 10

# Fade-in duration in seconds (default 1).
fade_duration = 1

# Which screen corner the card sits in (default bottom-right).
# One of: top-left, top-right, bottom-left, bottom-right
corner = bottom-right

# Speak each word aloud when it appears, using the system voice (default off).
# macOS only (uses `say`); ignored on other platforms.
# One of: true/false (also 1/0, yes/no, on/off)
speak = false

# Card background opacity, 0.0 (invisible) to 1.0 (opaque). Default ~0.30.
card_opacity = 0.3

# Card corner radius in points (default 16, max 64).
corner_radius = 16

# Active-recall mode (default off). When on, the translation (and the example
# after it) is held back until ~55% of the interval has passed, so you get a
# real window to recall the meaning before it's revealed. Never reveals earlier
# than translation_delay, so a long delay still wins on short intervals.
# One of: true/false (also 1/0, yes/no, on/off)
recall_mode = false

# Seconds the card takes to fade out before the next word (default 0 = hard cut).
# A small value (e.g. 0.4) softens the swap so words leave the way they arrive.
# Capped at half the interval at runtime so the fade never eats the whole word.
exit_duration = 0

# Chance (0.0..1.0) that a word swap re-shows an earlier word instead of a fresh
# one, for spaced review (default 0 = off, always a fresh word). e.g. 0.15 means
# roughly one in seven words is a recap of something seen a while ago. Recaps are
# always pulled from further back in the rotation, never the last few words.
recap_chance = 0
